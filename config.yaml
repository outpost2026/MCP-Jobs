# MCP-Jobs user configuration
# Edit this file to define your portals, categories, and search queries.
# The engine is universal — personalization is in this YAML only.

user: "default"

portals:
  jobs:
    enabled: true
    categories:
      - url: "https://www.jobs.cz/prace/praha/"
        pages: 5
      - url: "https://www.jobs.cz/prace/brno/"
        pages: 2

  bazos:
    enabled: true
    categories:
      - url: "https://prace.bazos.cz/"
        pages: 15
        params: {hlokalita: "18000", humkreis: "25"}
      - url: "https://prace.bazos.cz/brigada/"
        pages: 15
        params: {hlokalita: "18000", humkreis: "25"}

  pracecz:
    enabled: true
    categories:
      - url: "https://www.prace.cz/nabidky/hlavni-mesto-praha/praha/"
        pages: 10

  nyx:
    enabled: false
    categories: []

queries:
  python_jobs:
    boolean: "(python AND (developer OR vyvojar OR programator OR inzenyr OR automation OR scraping OR backend OR data)) NOT senior"
    exclude: ["agentura", "nabizim", "nabizime", "prodavame", "hledam praci", "hledame kolegu", "do tymu", "dodam", "firmy", "ico", "jmenuji se", "nabor", "parta", "provadim", "provadime", "prijmeme", "prijima objednavky", "lektor", "kurz"]
    min_salary: 0
    locations: []
    portals: ["jobs", "pracecz"]

  cnc_jobs:
    boolean: "(cnc OR frezar OR programovani OR serizovani)"
    exclude: ["agentura", "poptavam", "poptavame", "shanim", "hledam", "do tymu", "dodam", "firmy", "hledam praci", "hledame kolegu", "ico", "jmenuji se", "nabizim", "nabizime", "nabor", "parta", "personalni", "pronajem", "provadim", "provadime", "prijmeme", "prijima objednavky", "ubytovn", "zprostredkovani"]
    min_salary: 0
    locations: ["brno", "ostrava", "praha"]
    portals: ["bazos", "pracecz"]

  elektrikar:
    boolean: "(elektrikar OR elektroinstalace OR autoelektrikar)"
    exclude: ["agentura", "poptavam", "poptavame", "shanim", "hledam", "autoskola", "do tymu", "dodam", "firmy", "hledam praci", "hledame kolegu", "ico", "jmenuji se", "nabizim", "nabizime", "nabor", "parta", "prodavame", "provadim", "provadime", "prijmeme", "prijima objednavky", "revize"]
